[tool:pytest]
asyncio_mode = auto
addopts = -qq --cov=custom_components.came_domotic_unofficial
console_output_style = count

[coverage:run]
branch = False
omit =
    custom_components/came_domotic_unofficial/binary_sensor.py
    custom_components/came_domotic_unofficial/switch.py

[coverage:report]
show_missing = true
fail_under = 100
