repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-json
        exclude: ^(\.devcontainer|\.vscode)/
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
        args: ["--config-file", "pyproject.toml"]
      - id: check-aiocamedomotic-pin
        name: aiocamedomotic pin matches manifest.json
        entry: |-
          bash -c 'r=$(grep -oE "aiocamedomotic==[0-9.]+" requirements_dev.txt | head -n1); m=$(grep -oE "aiocamedomotic==[0-9.]+" custom_components/came_domotic/manifest.json | head -n1); if [ -z "$r" ] || [ -z "$m" ]; then echo "aiocamedomotic pin missing (requirements_dev.txt=$r manifest.json=$m)" >&2; exit 1; fi; if [ "$r" != "$m" ]; then echo "aiocamedomotic version mismatch - requirements_dev.txt=$r manifest.json=$m" >&2; exit 1; fi'
        language: system
        files: ^(requirements_dev\.txt|custom_components/came_domotic/manifest\.json)$
        pass_filenames: false
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest --timeout=9 -p no:sugar tests
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        stages: [pre-push]
