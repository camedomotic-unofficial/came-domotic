---
# Labels are used by GitHub's auto-generated release notes (.github/release.yml)
# to categorize PRs in changelogs.
#
# The repository labels are automatically synced from this file by the
# GitHub Action https://github.com/marketplace/actions/github-labeler.
- name: breaking
  description: Breaking or removed functionality
  color: bfd4f2
- name: bug
  description: Something isn't working
  color: d73a4a
- name: ci
  description: CI/CD and workflow changes
  color: 4a97d6
- name: dependencies
  description: Dependency updates
  color: 0366d6
- name: documentation
  description: Documentation changes
  color: 0075ca
- name: enhancement
  description: New feature or request
  color: a2eeef
- name: performance
  description: Performance improvement
  color: "016175"
- name: refactoring
  description: Internal refactoring, tests, or style changes
  color: ef67c4
